<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA fallback: redirect unknown paths back to index with encoded route.
        (function () {
            var segmentCount = 0;
            var location = window.location;
            var origin = location.protocol + "//" + location.hostname + (location.port ? ":" + location.port : "");
            var path = location.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~");
            var query = location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "";
            var redirectUrl = origin + "/?/" + path + query + location.hash;
            location.replace(redirectUrl);
        })();
    </script>
</head>

<body></body>

</html>
